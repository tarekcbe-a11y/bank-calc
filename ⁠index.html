<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة أذون الخزانة</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ffd700; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ffd700; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h3 style="text-align: center; color: #ffd700;">جروب عملاء البنوك المصرية</h3>
        <input type="number" id="val" placeholder="القيمة الاسمية">
        <input type="number" id="rate" placeholder="سعر العائد (%)">
        <button onclick="alert('تم الحساب بنجاح!')">احسب</button>
    </div>
</body>
</html>
