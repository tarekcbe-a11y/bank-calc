<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة أذون الخزانة - جروب عملاء البنوك المصرية</title>
    
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'a')) e.preventDefault();
            if (e.key === 'F12') e.preventDefault();
        });
    </script>

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 15px; user-select: none; }
        .container { max-width: 450px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; border: 2px solid #ffd700; box-sizing: border-box; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .lang-btn { background: #ffd700; color: #000; border: none; padding: 6px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        img { width: 50px; }
        .sub-title { text-align: center; color: #fff; font-size: 14px; margin-bottom: 5px; }
        .title { text-align: center; color: #ffd700; margin-bottom: 15px; font-weight: bold; font-size: 18px; }
        .market-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .market-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ffd700; background: #0f172a; color: white; font-size: 13px; cursor: pointer; }
        .market-btn.active { background: #ffd700; color: #000; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #ffd700; text-align: right; box-sizing: border-box; cursor: pointer; }
        .calc-btn { width: 100%; padding: 12px; margin: 10px 0; background: #ffd700; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .card { background: #0f172a; padding: 10px; border-radius: 6px; border: 1px solid #ffd700; text-align: center; }
        .card span { display: block; font-size: 10px; margin-bottom: 5px; color: #cbd5e1; }
        .card h4 { margin: 0; color: #ffd700; font-size: 14px; }
        .total-box { border: 2px solid #ff4d4d; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #ffd700; border-top: 1px solid #ffd700; padding-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-row">
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">English</button>
        <img src="logo.png" alt="Logo">
    </div>
    
    <div class="sub-title" id="subTitle">حاسبة اذون الخزانة</div>
    <div class="title" id="groupTitle">جروب عملاء البنوك المصرية</div>
    
    <div class="market-btns">
        <button class="market-btn active" id="btn1" onclick="setMarket('primary')">السوق الأولي</button>
        <button class="market-btn" id="btn2" onclick="setMarket('secondary')">السوق الثانوي</button>
    </div>
    <input type="text" id="nominal" placeholder="القيمة الاسمية" oninput="format(this)">
    <input type="number" id="rate" placeholder="سعر العائد (%)">
    <select id="days"></select>
    
    <button class="calc-btn" id="calcBtn" onclick="calc()">احسب الآن</button>
    
    <div class="results">
        <div class="card"><span id="lblPrice">سعر الشراء</span><h4 id="resPrice">0</h4></div>
        <div class="card"><span id="lblReturn">مبلغ راجع يوم الاصدار</span><h4 id="resReturn">0</h4></div>
        <div class="card"><span id="lblTax">الضريبة (20%)</span><h4 id="resTax">0</h4></div>
        <div class="card"><span id="lblNet">الربح الصافي</span><h4 id="resNet">0</h4></div>
    </div>
    <div class="total-box">
        <span id="lblTotal" style="font-size:13px">المبلغ المسترد نهاية المدة:</span><h4 id="resTotal" style="margin:5px 0 0 0">0</h4>
    </div>
    <div class="footer">
        🛡️ جروب عملاء البنوك المصرية<br>Developed by Tarek Metwally
    </div>
</div>

<script>
    let isAr = true;
    let currentType = 'primary';

    function toggleLang() {
        isAr = !isAr;
        document.documentElement.dir = isAr ? "rtl" : "ltr";
        document.getElementById('langBtn').innerText = isAr ? "English" : "العربية";
        document.getElementById('subTitle').innerText = isAr ? "حاسبة اذون الخزانة" : "T-Bills Calculator";
        document.getElementById('groupTitle').innerText = isAr ? "جروب عملاء البنوك المصرية" : "Egyptian Bank Clients Group";
        document.getElementById('btn1').innerText = isAr ? "السوق الأولي" : "Primary Market";
        document.getElementById('btn2').innerText = isAr ? "السوق الثانوي" : "Secondary Market";
        document.getElementById('calcBtn').innerText = isAr ? "احسب الآن" : "Calculate Now";
        document.getElementById('lblPrice').innerText = isAr ? "سعر الشراء" : "Purchase Price";
        document.getElementById('lblReturn').innerText = isAr ? "مبلغ راجع يوم الاصدار" : "Return at Issuance";
        document.getElementById('lblTax').innerText = isAr ? "الضريبة (20%)" : "Tax (20%)";
        document.getElementById('lblNet').innerText = isAr ? "الربح الصافي" : "Net Profit";
        document.getElementById('lblTotal').innerText = isAr ? "المبلغ المسترد نهاية المدة:" : "Amount at Maturity:";
        setMarket(currentType); 
    }

    function format(input) {
        let val = input.value.replace(/,/g, '');
        if (!isNaN(val) && val !== "") input.value = parseInt(val).toLocaleString();
    }

    function setMarket(type) {
        currentType = type;
        document.getElementById('btn1').className = type === 'primary' ? 'market-btn active' : 'market-btn';
        document.getElementById('btn2').className = type === 'secondary' ? 'market-btn active' : 'market-btn';
        
        let select = document.getElementById('days');
        select.innerHTML = "";
        let unit = isAr ? " يوم" : " Days";
        
        if (type === 'primary') {
            let options = [91, 182, 273, 364];
            options.forEach(d => {
                let opt = document.createElement("option");
                opt.value = d;
                opt.text = d + unit;
                select.add(opt);
            });
        } else {
            for (let i = 1; i <= 364; i++) {
                let opt = document.createElement("option");
                opt.value = i;
                opt.text = i + unit;
                select.add(opt);
            }
        }
    }

    function calc() {
        let P = parseFloat(document.getElementById('nominal').value.replace(/,/g, '')) || 0;
        let R = parseFloat(document.getElementById('rate').value) / 100 || 0;
        let D = parseInt(document.getElementById('days').value) || 0;
        
        let price = P / (1 + (R * D / 365));
        let profit = P - price;
        let tax = profit * 0.20;
        let netProfit = profit - tax;
        let finalAmount = price + netProfit; 

        document.getElementById('resPrice').innerText = Math.round(price).toLocaleString();
        document.getElementById('resReturn').innerText = Math.round(P - price).toLocaleString();
        document.getElementById('resTax').innerText = Math.round(tax).toLocaleString();
        document.getElementById('resNet').innerText = Math.round(netProfit).toLocaleString();
        document.getElementById('resTotal').innerText = Math.round(finalAmount).toLocaleString();
    }

    window.onload = function() {
        setMarket('primary');
    };
</script>
</body>
</html>
